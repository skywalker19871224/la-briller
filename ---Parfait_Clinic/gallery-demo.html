<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Gallery Demo - Parfait Clinic</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .gallery-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 20px;
            margin-bottom: 40px;
        }
        
        .section-title {
            text-align: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>パルフェクリニック 院内ギャラリー</h1>
        
        <div class="gallery-section">
            <h2 class="section-title">施設紹介</h2>
            <antigravity-gallery id="clinic-gallery" auto-speed="0.8"></antigravity-gallery>
        </div>
    </div>

    <script type="module">
        import './antigravity-gallery/gallery.js';
        
        // ギャラリーに画像を設定
        const gallery = document.getElementById('clinic-gallery');
        if (gallery) {
            gallery.images = [
                { src: './院内/受付.png', alt: '受付' },
                { src: './院内/待合スペース.png', alt: '待合スペース' },
                { src: './院内/医科診察室.png', alt: '医科診察室' },
                { src: './院内/診療室.png', alt: '診療室' },
                { src: './院内/スロープ.png', alt: 'スロープ' }
            ];
        }
    </script>
</body>
</html>
